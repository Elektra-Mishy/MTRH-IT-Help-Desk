{% extends 'base.html' %}
{% block page_title %}Add User{% endblock %}

{% block topbar_actions %}
<a href="{% url 'user_list' %}" class="btn"><i class="ti ti-arrow-left"></i> Back</a>
{% endblock %}

{% block content %}
<div style="max-width:560px">
  <div class="card">
    <div class="card-title"><i class="ti ti-user-plus" style="color:#0F6E56"></i> Create new user</div>
    <form method="POST">
      {% csrf_token %}
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">First name *</label>
          <input type="text" name="first_name" class="form-control" required>
        </div>
        <div class="form-group">
          <label class="form-label">Last name *</label>
          <input type="text" name="last_name" class="form-control" required>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Username *</label>
        <input type="text" name="username" class="form-control" required>
      </div>
      <div class="form-group">
        <label class="form-label">Email address *</label>
        <input type="email" name="email" class="form-control" required>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Role *</label>
          <select name="role" class="form-control" required>
            <option value="staff">Staff</option>
            <option value="technician">Technician</option>
            <option value="admin">Administrator</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Department</label>
          <select name="department" class="form-control">
            <option value="">-- Select department --</option>
            {% for dept in departments %}
            <option value="{{ dept.pk }}">{{ dept.department_name }}</option>
            {% endfor %}
          </select>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Password *</label>
        <input type="password" name="password" class="form-control" required>
      </div>
      <div style="display:flex;gap:8px;margin-top:8px">
        <button type="submit" class="btn btn-primary"><i class="ti ti-check"></i> Create User</button>
        <a href="{% url 'user_list' %}" class="btn">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
