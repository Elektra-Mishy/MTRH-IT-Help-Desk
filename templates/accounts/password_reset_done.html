<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Email Sent — MTRH IT Help Desk</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #F0F4F8;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .wrap {
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.10);
    width: 420px;
    max-width: 96vw;
    overflow: hidden;
    text-align: center;
  }
  .top {
    background: linear-gradient(135deg, #0A5C47 0%, #0F6E56 100%);
    padding: 32px 36px;
  }
  .top img {
    width: 70px; height: 70px;
    object-fit: contain;
    border-radius: 14px;
    background: #fff;
    padding: 6px;
    margin-bottom: 14px;
  }
  .top h2 { font-size: 18px; font-weight: 600; color: #fff; }
  .body { padding: 32px 36px; }
  .success-icon {
    width: 64px; height: 64px;
    background: #D1FAE5;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 16px;
    font-size: 30px;
    color: #065F46;
  }
  .body h3 { font-size: 16px; font-weight: 600; color: #0F172A; margin-bottom: 10px; }
  .body p { font-size: 13px; color: #64748B; line-height: 1.6; margin-bottom: 24px; }
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 24px;
    background: #0F6E56;
    color: #fff;
    border-radius: 9px;
    font-size: 13px;
    font-weight: 600;
    text-decoration: none;
    transition: background 0.2s;
  }
  .btn:hover { background: #085041; }
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <img src="{% static 'img/mtrh_logo.png' %}" alt="MTRH Logo">
    <h2>MTRH IT Help Desk</h2>
  </div>
  <div class="body">
    <div class="success-icon">
      <i class="ti ti-mail-check"></i>
    </div>
    <h3>Check your email!</h3>
    <p>
      We have sent a password reset link to your email address.
      Please check your inbox and spam folder.
      The link will expire in 24 hours.
    </p>
    <a href="{% url 'login' %}" class="btn">
      <i class="ti ti-arrow-left"></i> Back to login
    </a>
  </div>
</div>
</body>
</html>
