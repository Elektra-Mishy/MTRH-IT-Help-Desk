<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password — MTRH IT Help Desk</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #F0F4F8;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .wrap {
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.10);
    width: 420px;
    max-width: 96vw;
    overflow: hidden;
  }
  .top {
    background: linear-gradient(135deg, #0A5C47 0%, #0F6E56 100%);
    padding: 32px 36px;
    text-align: center;
  }
  .top img {
    width: 70px; height: 70px;
    object-fit: contain;
    border-radius: 14px;
    background: #fff;
    padding: 6px;
    margin-bottom: 14px;
  }
  .top h2 { font-size: 18px; font-weight: 600; color: #fff; margin-bottom: 6px; }
  .top p { font-size: 12px; color: rgba(255,255,255,0.7); }
  .body { padding: 32px 36px; }
  .desc {
    font-size: 13px;
    color: #64748B;
    line-height: 1.6;
    margin-bottom: 22px;
    padding: 12px 14px;
    background: #F0F4F8;
    border-radius: 8px;
    border-left: 3px solid #0F6E56;
  }
  .form-group { margin-bottom: 18px; }
  .form-group label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: #475569;
    margin-bottom: 6px;
  }
  .input-wrap { position: relative; }
  .input-wrap i {
    position: absolute;
    left: 12px; top: 50%;
    transform: translateY(-50%);
    font-size: 17px;
    color: #94A3B8;
  }
  .input-wrap input {
    width: 100%;
    padding: 10px 12px 10px 40px;
    border: 1.5px solid #E2E8F0;
    border-radius: 9px;
    font-size: 14px;
    color: #334155;
    background: #F8FAFC;
    font-family: inherit;
    outline: none;
    transition: all 0.2s;
  }
  .input-wrap input:focus {
    border-color: #0F6E56;
    background: #fff;
    box-shadow: 0 0 0 3px rgba(15,110,86,0.08);
  }
  .btn {
    width: 100%;
    padding: 11px;
    background: #0F6E56;
    color: #fff;
    border: none;
    border-radius: 9px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: background 0.2s;
  }
  .btn:hover { background: #085041; }
  .back-link {
    display: block;
    text-align: center;
    margin-top: 16px;
    font-size: 13px;
    color: #64748B;
    text-decoration: none;
  }
  .back-link:hover { color: #0F6E56; }
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <img src="{% static 'img/mtrh_logo.png' %}" alt="MTRH Logo">
    <h2>Reset your password</h2>
    <p>MTRH IT Help Desk</p>
  </div>
  <div class="body">
    <div class="desc">
      <i class="ti ti-info-circle"></i>
      Enter the email address linked to your account and we will send you a password reset link.
    </div>
    <form method="POST">
      {% csrf_token %}
      <div class="form-group">
        <label>Email address</label>
        <div class="input-wrap">
          <i class="ti ti-mail"></i>
          <input type="email" name="email"
                 placeholder="you@mtrh.go.ke"
                 required autofocus>
        </div>
      </div>
      <button type="submit" class="btn">
        <i class="ti ti-send"></i> Send reset link
      </button>
    </form>
    <a href="{% url 'login' %}" class="back-link">
      <i class="ti ti-arrow-left"></i> Back to login
    </a>
  </div>
</div>
</body>
</html>
