{% extends 'base.html' %}
{% block page_title %}Edit User{% endblock %}

{% block topbar_actions %}
<a href="{% url 'user_list' %}" class="btn"><i class="ti ti-arrow-left"></i> Back</a>
{% endblock %}

{% block content %}
<div style="max-width:560px">
  <div class="card">
    <div class="card-title"><i class="ti ti-edit" style="color:#0F6E56"></i> Edit {{ edit_user.get_full_name }}</div>
    <form method="POST">
      {% csrf_token %}
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">First name *</label>
          <input type="text" name="first_name" class="form-control" value="{{ edit_user.first_name }}" required>
        </div>
        <div class="form-group">
          <label class="form-label">Last name *</label>
          <input type="text" name="last_name" class="form-control" value="{{ edit_user.last_name }}" required>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Email address *</label>
        <input type="email" name="email" class="form-control" value="{{ edit_user.email }}" required>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Role *</label>
          <select name="role" class="form-control">
            <option value="staff" {% if edit_user.role == 'staff' %}selected{% endif %}>Staff</option>
            <option value="technician" {% if edit_user.role == 'technician' %}selected{% endif %}>Technician</option>
            <option value="admin" {% if edit_user.role == 'admin' %}selected{% endif %}>Administrator</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Department</label>
          <select name="department" class="form-control">
            <option value="">-- Select department --</option>
            {% for dept in departments %}
            <option value="{{ dept.pk }}" {% if edit_user.department == dept %}selected{% endif %}>
              {{ dept.department_name }}
            </option>
            {% endfor %}
          </select>
        </div>
      </div>
      <div style="display:flex;gap:8px;margin-top:8px">
        <button type="submit" class="btn btn-primary"><i class="ti ti-check"></i> Save Changes</button>
        <a href="{% url 'user_list' %}" class="btn">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
