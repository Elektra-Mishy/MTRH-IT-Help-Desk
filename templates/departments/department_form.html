{% extends 'base.html' %}
{% block page_title %}{{ action }} Department{% endblock %}

{% block topbar_actions %}
<a href="{% url 'department_list' %}" class="btn"><i class="ti ti-arrow-left"></i> Back</a>
{% endblock %}

{% block content %}
<div style="max-width:420px">
  <div class="card">
    <div class="card-title">
      <i class="ti ti-building-hospital" style="color:#0F6E56"></i> {{ action }} department
    </div>
    <form method="POST">
      {% csrf_token %}
      <div class="form-group">
        <label class="form-label">Department name *</label>
        <input type="text" name="department_name" class="form-control"
               value="{% if dept %}{{ dept.department_name }}{% endif %}"
               placeholder="e.g. ICT Department" required>
      </div>
      <div style="display:flex;gap:8px;margin-top:8px">
        <button type="submit" class="btn btn-primary"><i class="ti ti-check"></i> {{ action }}</button>
        <a href="{% url 'department_list' %}" class="btn">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
